<main class="guess-page">
  <section class="game-card">
    <header class="game-header">
      <div>
        <p class="eyebrow">Mind signal</p>
        <h1>Guess Master</h1>
      </div>
      <button class="ghost-btn" (click)="restartGame()">New Game</button>
    </header>

    <p class="subtitle">Crack the secret number from 1 to 100.</p>

    <div class="stats">
      <div class="stat-box">
        <span>Attempts</span>
        <strong>{{ attempts }}</strong>
      </div>
      <div class="stat-box">
        <span>Timer</span>
        <strong>{{ timer }}s</strong>
      </div>
      <div class="stat-box">
        <span>Best</span>
        <strong>{{ bestScore || '--' }}</strong>
      </div>
    </div>

    <div class="number-display" aria-hidden="true">
      <div class="pulse-ring"></div>
      <div class="question-mark">?</div>
    </div>

    <div class="input-area">
      <input type="number" [(ngModel)]="guess" min="1" max="100" placeholder="Enter number" (keyup.enter)="checkGuess()">
      <button class="primary-btn" (click)="checkGuess()">Guess</button>
    </div>

    <div class="message" [ngClass]="messageType">{{ message }}</div>
  </section>
</main>
