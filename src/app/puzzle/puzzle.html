<div class="game-container">
  <h1>Sliding Puzzle</h1>
  <div class="top-bar">
    <div>Moves: {{ moves }}</div>
    <button (click)="startGame()">Restart</button>
  </div>

  <div class="grid">
    <button class="tile" *ngFor="let tile of tiles; let i = index" [class.empty]="tile === 0" (click)="moveTile(i)">
      {{ tile !== 0 ? tile : '' }}
    </button>
  </div>
</div>

<div class="overlay" *ngIf="won">
  <div class="popup">
    <h2>Puzzle Solved</h2>
    <p>Moves: {{ moves }}</p>
    <button (click)="startGame()">Play Again</button>
  </div>
</div>
